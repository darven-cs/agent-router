service:
    name: Agent Router
    version: 1.0.0
    port: 6856
    api_key: "demo-api-key-12345678"
    model: claude-sonnet-4-6
upstreams:
    - name: Zhipu
      url: https://open.bigmodel.cn/api/anthropic
      api_key: "${ZHIPU_API_KEY}"
      auth_type: bearer
      enabled: true
      timeout: 30
      model: GLM-5.1
    - name: Aicodee
      url: https://v2.aicodee.com
      api_key: "${AICODEE_API_KEY}"
      auth_type: bearer
      enabled: true
      timeout: 30
      model: MiniMax-M2.7-highspeed
    - name: Minimax
      url: https://api.minimax.com/anthropic
      api_key: "${MINIMAX_API_KEY}"
      auth_type: bearer
      enabled: false
      timeout: 30
      model: MiniMax-M2.7
primary_upstream: ""
